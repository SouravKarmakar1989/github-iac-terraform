name: tf-drift-detect

# ── Terraform Drift Detection ──────────────────────────────────────────────────
# Runs 'terraform plan' across all modules daily.
# If plan shows a diff (exit code 2), the job fails and GitHub sends you
# an email notification — meaning real infrastructure drifted from your state.
#
# Also runs on workflow_dispatch so you can trigger manually anytime.

on:
  schedule:
    - cron: '0 6 * * 1-5'   # 06:00 UTC, Monday–Friday
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to check for drift'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read
  issues: write   # allows creating a GitHub Issue when drift is detected

env:
  DRIFT_ENV: ${{ inputs.environment || 'dev' }}

jobs:
  drift:
    name: Drift — azure/${{ matrix.module }}
    runs-on: ubuntu-latest
    continue-on-error: true   # let all modules run even if one drifts
    strategy:
      fail-fast: false
      matrix:
        module:
          - observability/log-analytics
          - observability/app-insights
          - security/key-vault
          - ai-foundry/genAI-agentic
          - ai-services/vision
          - ai-services/speech-language
          - ai-services/doc-intelligence
          - ai-services/content-understanding
          - ai-services/ai-search
          - azure-minimal

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: azure-infrastructure/${{ matrix.module }}
        run: terraform init -backend-config=env/${{ env.DRIFT_ENV }}/backend.hcl
        # Skip modules that don't have a backend for this environment
        continue-on-error: true

      - name: Terraform Plan (drift check)
        id: plan
        working-directory: azure-infrastructure/${{ matrix.module }}
        # Exit code 0 = no changes, 1 = error, 2 = changes detected (drift)
        run: |
          terraform plan \
            -var-file=env/${{ env.DRIFT_ENV }}/terraform.tfvars \
            -detailed-exitcode \
            -no-color 2>&1 | tee plan_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Flag drift
        if: steps.plan.outputs.exit_code == '2'
        run: |
          echo "::warning::DRIFT DETECTED in azure-infrastructure/${{ matrix.module }} (${{ env.DRIFT_ENV }})"
          echo "DRIFT=true" >> $GITHUB_ENV

  # ── Open a GitHub Issue if any module drifted ─────────────────────────────
  notify:
    name: Report Drift
    runs-on: ubuntu-latest
    needs: drift
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Issue for drift
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Drift Detected] Terraform state mismatch — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## Terraform Drift Detected',
              '',
              `**Environment:** \`${{ env.DRIFT_ENV }}\``,
              `**Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              '',
              'One or more modules have drifted from their Terraform state.',
              'Review the workflow run above to see which modules are affected,',
              'then run the apply workflow to reconcile.',
              '',
              '> Auto-generated by the drift detection workflow.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['drift', 'infrastructure'],
            });
