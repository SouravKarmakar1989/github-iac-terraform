name: terraform-apply

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Infrastructure module to deploy'
        required: true
        type: choice
        options:
          - azure-minimal
          - afd
          - apim
          - func-app
          - vnet
          - ai-manage
          - ai-foundry/ai-genai
          - ai-foundry/ai-agent
          - databricks
          - data-factory
          - integration
          - data-analytics
          - compute
          - storage/blob
          - storage/adls
          - storage/files
          - database/cosmos
          - database/sql
          - database/postgres
          - database/mysql
          - database/redis
      environment:
        description: 'Target environment (e.g. dev, staging, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      target_resource:
        description: 'Terraform resource to target (e.g. azurerm_storage_account.sa). Leave empty to apply all.'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read
  actions: write
jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      TF_TARGET: ${{ inputs.target_resource != '' && format('-target={0}', inputs.target_resource) || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infrastructure/${{ inputs.module }}
        run: terraform init -backend-config=env/${{ inputs.environment }}/backend.hcl

      - name: Terraform Plan
        working-directory: infrastructure/${{ inputs.module }}
        run: terraform plan -var-file=env/${{ inputs.environment }}/terraform.tfvars ${{ env.TF_TARGET }}

      - name: Terraform Apply
        working-directory: infrastructure/${{ inputs.module }}
        run: terraform apply -auto-approve -var-file=env/${{ inputs.environment }}/terraform.tfvars ${{ env.TF_TARGET }}
